<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Horário | Leila Salon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #d8a4a5;
            --primary-hover: #c48b8c;
            --bg-color: #fcf9f9;
            --text-main: #2c2c2c;
            --text-light: #777777;
            --card-bg: #ffffff;
            --input-border: #e0e0e0;
            --shadow: 0 8px 25px rgba(0, 0, 0, 0.04);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin-bottom: 2rem;
        }

        .back-link {
            display: inline-block;
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            transition: var(--transition);
        }

        .back-link:hover { color: var(--primary-color); }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        main {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: var(--shadow);
            border: 1px solid rgba(216, 164, 165, 0.1);
        }

        .form-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            color: var(--text-main);
            transition: var(--transition);
            outline: none;
        }

        input[type="datetime-local"] {
            color: var(--text-main);
            background-color: transparent;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(216, 164, 165, 0.2);
        }

        button.btn-primary {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }

        button.btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(216, 164, 165, 0.3);
        }

    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-link">← Voltar ao Início</a>
    <h1>Seu Momento</h1>
    <p class="subtitle">Escolha o serviço e o horário ideal para você.</p>
</header>

<main>
    <section class="card">

        <div class="form-group">
            <label for="cpf">Seu CPF</label>
            <input type="text" id="cpf" placeholder="Ex: 123.456.789-00">
        </div>

        <div class="form-group">
            <label for="data">Data e Horário</label>
            <input type="datetime-local" id="data">
        </div>

        <div class="form-group">
            <label for="servicos">Quais serviços deseja realizar?</label>
            <input type="text" id="servicos" placeholder="Ex: Corte, Coloração, Escova...">
        </div>

        <button class="btn-primary" onclick="cadastrarAgendamento()">Confirmar Agendamento</button>

    </section>
</main>

<script src="script.js"></script>

</body>
</html>
