<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Gestão | Leila Salon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #d8a4a5;
            --primary-hover: #c48b8c;
            --bg-color: #f4e9e9;
            --text-main: #2c2c2c;
            --text-light: #777777;
            --card-bg: #ffffff;
            --input-border: #e0e0e0;
            --danger-color: #e74c3c;
            --shadow: 0 8px 25px rgba(0, 0, 0, 0.04);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .logout-btn {
            background: none;
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .logout-btn:hover {
            background-color: var(--danger-color);
            color: white;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--text-main);
            text-align: center;
            flex-grow: 1;
        }

        main { width: 100%; max-width: 900px; }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            background-color: var(--card-bg);
            padding: 1rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .tab-btn {
            flex: 1;
            padding: 0.8rem;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            transition: var(--transition);
            font-size: 1rem;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 0.5rem;
        }

        ul { list-style: none; }
        li {
            background-color: #fffafb; padding: 1rem; border-radius: 8px; margin-bottom: 0.8rem;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--input-border);
        }
        .agenda-time { background-color: var(--primary-color); color: white; padding: 0.5rem; border-radius: 6px; font-weight: 600; font-size: 0.85rem; text-align: center; min-width: 70px; }
        .agenda-details { display: flex; flex-direction: column; gap: 0.2rem; flex-grow: 1; margin-left: 1rem;}
        .client-name { font-weight: 600; color: var(--text-main); font-size: 1rem; }
        .service-type { font-size: 0.85rem; color: var(--text-light); }
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 1.2rem; transition: var(--transition); opacity: 0.7; }
        .btn-icon:hover { opacity: 1; transform: scale(1.1); }
        .btn-delete { color: var(--danger-color); }

        button.btn-primary { background-color: var(--text-main); color: white; padding: 0.8rem 1.5rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: var(--transition); }
        button.btn-primary:hover { background-color: #000; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        .stat-card { background-color: var(--bg-color); border-radius: 12px; padding: 2rem; text-align: center; border-bottom: 4px solid var(--primary-color); }
        .stat-card.confirmado { border-bottom-color: #28a745; }
        .stat-card.pendente { border-bottom-color: #ffc107; }
        .stat-number { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 600; color: var(--text-main); }

        .filter-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        input[type="datetime-local"] { width: 100%; padding: 0.8rem; border: 1px solid var(--input-border); border-radius: 8px; font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body>

<header>
    <div style="width: 80px;"></div>
    <h1>Painel de Controle</h1>
    <button class="logout-btn" onclick="sairDaGestao()">Sair</button>
</header>

<main>
    <div class="tabs">
        <button class="tab-btn active" onclick="mudarAbaGestao('desempenho')">📊 Desempenho</button>
        <button class="tab-btn" onclick="mudarAbaGestao('agenda')">📅 Agenda</button>
        <button class="tab-btn" onclick="mudarAbaGestao('clientes')">👥 Clientes</button>
    </div>

    <div id="aba-desempenho" class="tab-content active">
        <section class="card" id="telaDesempenho">
            <h2>Resumo da Semana</h2>
            <p id="textoPeriodo" style="color: var(--text-light); margin-bottom: 1.5rem; text-align: center;">Calculando período...</p>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalSemana">0</div>
                    <p style="font-weight: 600; color: var(--text-light);">Total</p>
                </div>
                <div class="stat-card confirmado">
                    <div class="stat-number" id="totalConfirmados">0</div>
                    <p style="font-weight: 600; color: var(--text-light);">Confirmados</p>
                </div>
                <div class="stat-card pendente">
                    <div class="stat-number" id="totalPendentes">0</div>
                    <p style="font-weight: 600; color: var(--text-light);">Pendentes</p>
                </div>
            </div>
        </section>
    </div>

    <div id="aba-agenda" class="tab-content">
        <section class="card">
            <h2>Aprovações Pendentes</h2>
            <ul id="listaPendentes"></ul>
            <div style="text-align: center; margin-top: 1rem;">
                <button class="btn-primary" onclick="paginaAnterior()">← Voltar</button>
                <button class="btn-primary" onclick="proximaPagina()">Avançar →</button>
            </div>
        </section>

        <section class="card">
            <h2>Buscar no Histórico</h2>
            <div class="filter-row">
                <div>
                    <label>Início</label>
                    <input type="datetime-local" id="filtroInicio">
                </div>
                <div>
                    <label>Fim</label>
                    <input type="datetime-local" id="filtroFim">
                </div>
            </div>
            <button class="btn-primary" style="width: 100%;" onclick="filtrarAgendamentos()">Filtrar Agendamentos</button>

            <ul id="listaAgendamentosHist" style="margin-top: 1.5rem;"></ul>
        </section>
    </div>

    <div id="aba-clientes" class="tab-content">
        <section class="card">
            <h2>Base de Clientes</h2>
            <ul id="listaClientes"></ul>
            <div style="text-align: center; margin-top: 1rem;">
                <button class="btn-primary" onclick="mudarPagina('anterior')">← Voltar</button>
                <button class="btn-primary" onclick="mudarPagina('proxima')">Avançar →</button>
            </div>
        </section>
    </div>

</main>

<script src="script.js"></script>

</body>
</html>
